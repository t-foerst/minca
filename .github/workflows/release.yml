name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev

      - name: Build Linux
        working-directory: flutter_app
        run: |
          VERSION="${{ github.ref_name }}"
          flutter build linux --release --dart-define=APP_VERSION=${VERSION#v}

      - name: Package Linux build
        run: |
          tar -czf minca-linux.tar.gz \
            -C flutter_app/build/linux/x64/release/bundle .

      - uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: minca-linux.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build Windows
        working-directory: flutter_app
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          flutter build windows --release --dart-define=APP_VERSION=$version

      - name: Package Windows build
        run: |
          Compress-Archive `
            -Path flutter_app\build\windows\x64\runner\Release\* `
            -DestinationPath minca-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: minca-windows.zip

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build Android APK
        working-directory: flutter_app
        run: flutter build apk --release

      - name: Copy APK
        run: |
          cp flutter_app/build/app/outputs/flutter-apk/app-release.apk \
            minca-android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: minca-android.apk

  release:
    needs: [build-linux, build-windows, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            linux-release/minca-linux.tar.gz
            windows-release/minca-windows.zip
            android-release/minca-android.apk
          generate_release_notes: true
